<!DOCTYPE html>
<html lang="en-US">
  <head>
    <meta charset="utf-8">
    <title>alphonse mucha</title>
    <meta name="description" content="my favorite mucha works">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/backgrounds.css">
    <link rel="stylesheet" href="../css/gallery.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Aladin&family=Amarante&family=Faculty+Glyphic&family=Macondo+Swash+Caps&family=Reenie+Beanie&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
  </head>
  <body>
    <div class="anv_bg-image"></div>
    <h1 class="amarante-regular center-text">~ alphonse mucha ~</h1>
    <div class="row center">
      <div class="column">
        <figure class="image-hover-effect">
          <img src="../img/anv/poster-for-'salon-des-cent-20th-exhibition'-1897.jpg" style="width:100%" alt="Poster for Salon des Cent 20th Exhibition, 1897">
          <figcaption class="caption">Poster for Salon des Cent 20th Exhibition, 1897</figcaption>
        </figure>
        
        <figure class="image-hover-effect">
          <img src="../img/anv/gismonda-1894.jpg" style="width:100%" alt="Gismonda, 1894">
          <figcaption class="caption">Gismonda, 1894</figcaption>
        </figure>
        
        <figure class="image-hover-effect">
          <img src="../img/anv/benedictine-1898.jpg" style="width:100%" alt="Bénédictine, 1898">
          <figcaption class="caption">Bénédictine, 1898</figcaption>
        </figure>
      </div>
      
      <div class="column">
        <figure class="image-hover-effect">
          <img src="../img/anv/amants-1895.jpg" style="width:100%" alt="Amants (Lovers), 1895">
          <figcaption class="caption">Amants (Lovers), 1895</figcaption>
        </figure>
        
        <figure class="image-hover-effect">
          <img src="../img/anv/primrose-1899.jpg" style="width:100%" alt="Primrose, 1899">
          <figcaption class="caption">Primrose, 1899</figcaption>
        </figure>
        
        <figure class="image-hover-effect">
          <img src="../img/anv/the-arts-dance-1898.jpg" style="width:100%" alt="The Arts: Dance, 1898">
          <figcaption class="caption">The Arts: Dance, 1898</figcaption>
        </figure>
      </div>
    </div>
    
    <div style="display: flex;
    justify-content: center;
    align-items: center;
    margin-top: 30px;
    margin-bottom: 50px;">
      <a href="../bio-pages/anv.html" target="_self"><button>back</button></a>
    </div>
    <div id="lightbox" class="lightbox" onclick="closeLightbox()">
      <span class="close-btn">&times;</span>
      <img class="lightbox-content" id="lightbox-img">
    </div>

    <script>
      const images = document.querySelectorAll('.image-hover-effect img');
      const lightbox = document.getElementById('lightbox');
      const lightboxImg = document.getElementById('lightbox-img');

      images.forEach(img => {
        img.addEventListener('click', function (e) {
          e.stopPropagation();
          lightbox.style.display = 'flex';
          lightboxImg.src = this.src;
        });
      });

      function closeLightbox () {
        lightbox.style.display = 'none';
      }

      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') {
          closeLightbox();
        }
      });
    </script>
  </body>
</html>
