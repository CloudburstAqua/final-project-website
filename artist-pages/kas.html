<!DOCTYPE html>
<html lang="en-US">
  <head>
    <meta charset="utf-8">
    <title>wassily kandinsky</title>
    <meta name="description" content="my favorite kandinsky works">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/backgrounds.css">
    <link href="https://fonts.cdnfonts.com/css/bauhaus-modern" rel="stylesheet">
    <link rel="stylesheet" href="../css/gallery.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
  </head>
  <body>
    <div class="bau_bg-image"></div>
    <h1 class="center inknut-antiqua-bold" style="font-family: 'Bauhaus Modern', sans-serif;">~ wassily kandinsky ~</h1>
    <div class="row center">
      <div class="column">
        <figure class="image-hover-effect">
          <img src="../img/bau/composition_ix_1936.jpg" style="width:100%" alt="Composition IX, 1936">
          <figcaption class="caption">Composition IX, 1936</figcaption>
        </figure>

        <figure class="image-hover-effect">
          <img src="../img/bau/inner-alliance.jpg" style="width:100%" alt="Inner Alliance, 1929">
          <figcaption class="caption">Inner Alliance, 1929</figcaption>
        </figure>

        <figure class="image-hover-effect">
          <img src="../img/bau/several-circles.jpg" style="width:100%" alt="Several Circles, 1926">
          <figcaption class="caption">Several Circles, 1926</figcaption>
        </figure>
      </div>

      <div class="column">
        <figure class="image-hover-effect">
          <img src="../img/bau/yellow-red-and-blue-1925.webp" style="width:100%" alt="Yellow Red and Blue, 1925">
          <figcaption class="caption">Yellow Red and Blue, 1925</figcaption>
        </figure>

        <figure class="image-hover-effect">
          <img src="../img/bau/on-white-ii-1923.jpg" style="width:100%" alt="On White II, 1923">
          <figcaption class="caption">On White II, 1923</figcaption>
        </figure>

        <figure class="image-hover-effect">
          <img src="../img/bau/circles_in_a_circle_1923.jpg" style="width:100%" alt="Circles in a Circle, 1923">
          <figcaption class="caption">Circles in a Circle, 1923</figcaption>
        </figure>
      </div>
    </div>

    <div style="display: flex;
    justify-content: center;
    align-items: center;
    margin-top: 30px;
    margin-bottom: 50px;">
      <a href="../bio-pages/bau.html" target="_self"><button>back</button></a>
    </div>
    <div id="lightbox" class="lightbox" onclick="closeLightbox()">
      <span class="close-btn">&times;</span>
      <img class="lightbox-content" id="lightbox-img">
    </div>

    <script>
      const images = document.querySelectorAll('.image-hover-effect img');
      const lightbox = document.getElementById('lightbox');
      const lightboxImg = document.getElementById('lightbox-img');

      images.forEach(img => {
        img.addEventListener('click', function (e) {
          e.stopPropagation();
          lightbox.style.display = 'flex';
          lightboxImg.src = this.src;
        });
      });

      function closeLightbox () {
        lightbox.style.display = 'none';
      }

      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') {
          closeLightbox();
        }
      });
    </script>
  </body>
</html>
