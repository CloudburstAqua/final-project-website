<!DOCTYPE html>
<html lang="en-US">
  <head>
    <meta charset="utf-8">
    <title>art chantry</title>
    <meta name="description" content="my favorite chantry works">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/backgrounds.css">
    <link rel="stylesheet" href="../css/gallery.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
  </head>
  <body>
    <div class="gru_bg-image"></div>
    <h1 class="center special-elite-regular">~ art chantry ~</h1>
    <div class="row center">
      <div class="column">
        <figure class="image-hover-effect">
          <img src="../img/gru/propaganda-new-city-theater-poster-1988-art-chantry.webp" style="width:100%" alt="Propaganda New City Theater Poster, 1988">
          <figcaption class="caption">Propaganda New City Theater Poster, 1988</figcaption>
        </figure>

        <figure class="image-hover-effect">
          <img src="../img/gru/rocky-horror-show-empty-space-theatre-poster-1986-art-chantry.jpg.webp" style="width:100%" alt="The Rocky Horror Show Empty Space Theatre Poster, 1986">
          <figcaption class="caption">The Rocky Horror Show Empty Space Theatre Poster, 1986</figcaption>
        </figure>

        <figure class="image-hover-effect">
          <img src="../img/gru/the-rocket-wipers-doa-cover-february-1984-art-chantry.jpg.webp" style="width:100%" alt="The Rocket: Wipers/DOA Cover, February 1984">
          <figcaption class="caption">The Rocket: Wipers/DOA Cover, February 1984</figcaption>
        </figure>
      </div>

      <div class="column">
        <figure class="image-hover-effect">
          <img src="../img/gru/teriyaki-asthma-vol-1-cz009-cover-1989-art-chantry.jpg.webp" style="width:100%" alt="Teriyaki Asthma Vol. 1 Cover, 1989">
          <figcaption class="caption">Teriyaki Asthma Vol. 1 Cover, 1989</figcaption>
        </figure>

        <figure class="image-hover-effect">
          <img src="../img/gru/give-peace-a-dance-seattle-center-house-poster-1986-art-chantry.jpg.webp" style="width:100%" alt="Give Peace a Dance Seattle Center House Poster, 1986">
          <figcaption class="caption">Give Peace a Dance Seattle Center House Poster, 1986</figcaption>
        </figure>

        <figure class="image-hover-effect">
          <img src="../img/gru/the-cramps-guitar-wolf-showbox-poster-1997-art-chantry.jpg.webp" style="width:100%" alt="The Cramps with Guitar Wolf at Showbox Poster, 1997">
          <figcaption class="caption">The Cramps with Guitar Wolf at Showbox Poster, 1997</figcaption>
        </figure>
      </div>
    </div>

    <div style="display: flex;
    justify-content: center;
    align-items: center;
    margin-top: 30px;
    margin-bottom: 50px;">
      <a href="../bio-pages/gru.html" target="_self"><button>back</button></a>
    </div>
    <div id="lightbox" class="lightbox" onclick="closeLightbox()">
      <span class="close-btn">&times;</span>
      <img class="lightbox-content" id="lightbox-img">
    </div>

    <script>
      const images = document.querySelectorAll('.image-hover-effect img');
      const lightbox = document.getElementById('lightbox');
      const lightboxImg = document.getElementById('lightbox-img');

      images.forEach(img => {
        img.addEventListener('click', function (e) {
          e.stopPropagation();
          lightbox.style.display = 'flex';
          lightboxImg.src = this.src;
        });
      });

      function closeLightbox () {
        lightbox.style.display = 'none';
      }

      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') {
          closeLightbox();
        }
      });
    </script>
  </body>
</html>
