<!DOCTYPE html>
<html lang="en-US">
  <head>
    <meta charset="utf-8">
    <title>henri de toulouse-lautrec</title>
    <meta name="description" content="my favorite lautrec works">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/backgrounds.css">
    <link rel="stylesheet" href="../css/gallery.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Aladin&family=Amarante&family=Faculty+Glyphic&family=Macondo+Swash+Caps&family=Reenie+Beanie&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
  </head>
  <body>
    <div class="anv_bg-image"></div>
    <h1 class="amarante-regular center-text">~ henri de toulouse-lautrec ~</h1>
    <div class="row center">
      <div class="column">
        <figure class="image-hover-effect">
          <img src="../img/anv/Divan-Japonais-1893.jpg" style="width:100%" alt="Divan Japonais, 1893">
          <figcaption class="caption">Divan Japonais, 1893</figcaption>
        </figure>

        <figure class="image-hover-effect">
          <img src="../img/anv/Moulin-Rouge-La-Goulue-1891.jpg" style="width:100%" alt="Moulin Rouge: La Goulue, 1891">
          <figcaption class="caption">Moulin Rouge: La Goulue, 1891</figcaption>
        </figure>

        <figure class="image-hover-effect">
          <img src="../img/anv/Avril-1893.jpg" style="width:100%" alt="Avril (Jane Avril), 1893">
          <figcaption class="caption">Avril (Jane Avril), 1893</figcaption>
        </figure>
      </div>

      <div class="column">
        <figure class="image-hover-effect">
          <img src="../img/anv/La-Troupe-de-Mademoiselle-Eglantine-1896.jpg" style="width:100%" alt="La Troupe de Mademoiselle Églantine, 1896">
          <figcaption class="caption">La Troupe de Mademoiselle Églantine, 1896</figcaption>
        </figure>

        <figure class="image-hover-effect">
          <img src="../img/anv/Reine-De-Joie-1892.jpg" style="width:100%" alt="Reine de Joie, 1892">
          <figcaption class="caption">Reine de Joie, 1892</figcaption>
        </figure>

        <figure class="image-hover-effect">
          <img src="../img/anv/Confetti-1894.jpg" style="width:100%" alt="Confetti, 1894">
          <figcaption class="caption">Confetti, 1894</figcaption>
        </figure>
      </div>
    </div>

    <div style="display: flex;
    justify-content: center;
    align-items: center;
    margin-top: 30px;
    margin-bottom: 50px;">
      <a href="../bio-pages/anv.html" target="_self"><button>back</button></a>
    </div>
    <div id="lightbox" class="lightbox" onclick="closeLightbox()">
      <span class="close-btn">&times;</span>
      <img class="lightbox-content" id="lightbox-img">
    </div>

    <script>
      const images = document.querySelectorAll('.image-hover-effect img');
      const lightbox = document.getElementById('lightbox');
      const lightboxImg = document.getElementById('lightbox-img');

      images.forEach(img => {
        img.addEventListener('click', function (e) {
          e.stopPropagation();
          lightbox.style.display = 'flex';
          lightboxImg.src = this.src;
        });
      });

      function closeLightbox () {
        lightbox.style.display = 'none';
      }

      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') {
          closeLightbox();
        }
      });
    </script>
  </body>
</html>
